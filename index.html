<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy-Converter</title>
    <style>
        body {
            background-color: #0d0d11;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #16161f;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 450px;
            border: 1px solid #232330;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #ffffff;
        }

        .section {
            background-color: #1c1c27;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #2d2d3f;
        }

        .section.local { border-left: 4px solid #00ffcc; }
        .section.beta { border-left: 4px solid #ff007f; }

        h2 {
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .section.local h2 { color: #00ffcc; }
        .section.beta h2 { color: #ff007f; }

        input[type="file"] { display: none; }

        .custom-file-upload {
            display: block;
            background-color: #252538;
            color: #fff;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px dashed #444460;
            margin-bottom: 5px;
        }

        .custom-file-upload:hover { background-color: #2d2d44; }

        #file-status {
            display: block;
            text-align: center;
            font-size: 13px;
            color: #aaaaaa;
            margin-bottom: 15px;
            word-break: break-all;
        }

        .converter-flow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .format-select-btn {
            background-color: #252538;
            color: white;
            border: 1px solid #3d3d5c;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            min-width: 90px;
            text-align: center;
        }

        .arrow { font-size: 20px; color: #aaaaaa; }

        .dropdown-menu {
            display: none;
            position: absolute;
            background-color: #1f1f2e;
            border: 1px solid #3d3d5c;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
            width: 180px;
            padding: 10px;
        }

        .dropdown-category {
            font-size: 11px;
            color: #8888aa;
            text-transform: uppercase;
            margin: 5px 0;
            border-bottom: 1px solid #2d2d3f;
            padding-bottom: 2px;
        }

        .format-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        .format-opt {
            background-color: #2d2d44;
            color: white;
            padding: 5px;
            text-align: center;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .format-opt:hover { background-color: #00ffcc; color: #000; font-weight: bold; }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background-color: #0d0d11;
            border: 1px solid #33334c;
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        input[type="text"]:focus { outline: none; border-color: #ff007f; }

        .btn-action {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .local .btn-action { background-color: #00ffcc; color: #0d0d11; }
        .local .btn-action:hover { box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); }

        .beta .btn-action { background-color: #ff007f; color: white; }
        .beta .btn-action:hover { box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }
    </style>
</head>
<body>

    <div class="container">
        <h1>EASY-CONVERTER</h1>

        <div class="section local">
            <h2>Konwerter Plików</h2>
            <label class="custom-file-upload">
                <input type="file" id="file-chooser" onchange="plikZostalWybrany()">
                📁 Wybierz plik z komputera
            </label>
            <div id="file-status">Nie wybrano pliku</div>

            <div class="converter-flow">
                <div style="position: relative;">
                    <div class="format-select-btn" id="btn-source" onclick="toggleMenu('source-menu', event)">Z: ---</div>
                    <div id="source-menu" class="dropdown-menu">
                        <div class="dropdown-category">Formaty</div>
                        <div class="format-grid">
                            <div class="format-opt" onclick="setFormat('source', 'PNG')">PNG</div>
                            <div class="format-opt" onclick="setFormat('source', 'JPG')">JPG</div>
                            <div class="format-opt" onclick="setFormat('source', 'WEBP')">WEBP</div>
                        </div>
                    </div>
                </div>

                <div class="arrow">➔</div>

                <div style="position: relative;">
                    <div class="format-select-btn" id="btn-target" onclick="toggleMenu('target-menu', event)">NA: ---</div>
                    <div id="target-menu" class="dropdown-menu" style="right: 0;">
                        <div class="dropdown-category">Formaty</div>
                        <div class="format-grid">
                            <div class="format-opt" onclick="setFormat('target', 'PNG')">PNG</div>
                            <div class="format-opt" onclick="setFormat('target', 'JPG')">JPG</div>
                            <div class="format-opt" onclick="setFormat('target', 'WEBP')">WEBP</div>
                        </div>
                    </div>
                </div>
            </div>

            <button class="btn-action" onclick="konwertujLokalny()">Konwertuj Plik</button>
        </div>

        <div class="section beta">
            <h2>Funkcje BETA (Downloader)</h2>
            <input type="text" id="link-input" placeholder="Wklej link z YouTube...">
            <button class="btn-action" onclick="pobierzZYouTube()">Pobierz jako MP3</button>
        </div>
    </div>

    <canvas id="conversion-canvas" style="display: none;"></canvas>

    <script>
        let wybranySource = "---";
        let wybranyTarget = "---";

        function plikZostalWybrany() {
            const fileInput = document.getElementById('file-chooser');
            const statusText = document.getElementById('file-status');
            
            if (fileInput.files.length > 0) {
                const plik = fileInput.files[0];
                statusText.innerText = "Wybrano: " + plik.name;
                statusText.style.color = "#00ffcc";

                const rozszerzenie = plik.name.split('.').pop().toUpperCase();
                // Dla JPG/JPEG ujednolicamy do JPG
                const dopasowaneRozszerzenie = rozszerzenie === "JPEG" ? "JPG" : rozszerzenie;
                setFormat('source', dopasowaneRozszerzenie);
            }
        }

        function toggleMenu(menuId, event) {
            event.stopPropagation();
            document.getElementById('source-menu').style.display = 'none';
            document.getElementById('target-menu').style.display = 'none';
            
            const menu = document.getElementById(menuId);
            menu.style.display = "block";
        }

        function setFormat(typ, format) {
            if (typ === 'source') {
                wybranySource = format;
                document.getElementById('btn-source').innerText = "Z: " + format;
            } else {
                wybranyTarget = format;
                document.getElementById('btn-target').innerText = "NA: " + format;
            }
            document.getElementById('source-menu').style.display = 'none';
            document.getElementById('target-menu').style.display = 'none';
        }

        // PRAWDZIWA KONWERSJA PNG -> JPG / JPG -> PNG w przeglądarce
        function konwertujLokalny() {
            const fileInput = document.getElementById('file-chooser');
            if (fileInput.files.length === 0) {
                alert("Najpierw wybierz plik z komputera!");
                return;
            }
            if (wybranySource === "---" || wybranyTarget === "---") {
                alert("Wybierz format docelowy!");
                return;
            }

            const plik = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('conversion-canvas');
                    const ctx = canvas.getContext('2d');

                    // Ustawiamy wymiary płótna dokładnie takie jak obrazek
                    canvas.width = img.width;
                    canvas.height = img.height;

                    // Jeśli konwertujemy do JPG, dodajemy białe tło (bo PNG może być przezroczyste, a JPG nie obsługuje przezroczystości)
                    if (wybranyTarget === "JPG") {
                        ctx.fillStyle = "#ffffff";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    }

                    // Rysujemy stary obrazek na płótnie
                    ctx.drawImage(img, 0, 0);

                    // Mapowanie formatów dla przeglądarki
                    let mimeType = "image/png";
                    if (wybranyTarget === "JPG") mimeType = "image/jpeg";
                    if (wybranyTarget === "WEBP") mimeType = "image/webp";

                    // Wyciągamy z płótna nowy, przekonwertowany plik
                    const dataUrl = canvas.toDataURL(mimeType, 0.9);
                    
                    // Automatyczne pobieranie nowego pliku
                    const nowaNazwa = plik.name.substring(0, plik.name.lastIndexOf('.')) + "." + wybranyTarget.toLowerCase();
                    const link = document.createElement('a');
                    link.href = dataUrl;
                    link.download = nowaNazwa;
                    link.click();
                };
                img.src = event.target.result;
            };

            reader.readAsDataURL(plik);
        }

        function pobierzZYouTube() {
            const urlInput = document.getElementById('link-input').value.trim();
            if (urlInput === "") {
                alert("Wklej link z YouTube!");
                return;
            }
            alert("Przetwarzanie filmu... Zaraz rozpocznie się pobieranie.");
            window.location.href = "https://api.vexd.net/download?url=" + encodeURIComponent(urlInput) + "&format=mp3";
        }

        window.onclick = function() {
            document.getElementById('source-menu').style.display = 'none';
            document.getElementById('target-menu').style.display = 'none';
        }
    </script>
</body>
</html>
