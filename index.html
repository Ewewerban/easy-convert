<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy-Converter</title>
    <style>
        /* --- STYLIZACJA --- */
        body {
            background-color: #0d0d11;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #16161f;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 450px;
            border: 1px solid #232330;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .section {
            background-color: #1c1c27;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #2d2d3f;
        }

        .section.local { border-left: 4px solid #00ffcc; }
        .section.beta { border-left: 4px solid #ff007f; }

        h2 {
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .section.local h2 { color: #00ffcc; }
        .section.beta h2 { color: #ff007f; }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: block;
            background-color: #252538;
            color: #fff;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px dashed #444460;
        }

        .custom-file-upload:hover {
            background-color: #2d2d44;
        }

        #file-name {
            display: block;
            margin-top: 10px;
            font-size: 13px;
            color: #aaaaaa;
            text-align: center;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background-color: #0d0d11;
            border: 1px solid #33334c;
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #ff007f;
        }

        .options {
            margin-bottom: 15px;
            font-size: 14px;
        }

        .options label {
            margin-right: 15px;
            cursor: pointer;
        }

        button.btn-action {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .beta .btn-action {
            background-color: #ff007f;
            color: white;
        }

        .beta .btn-action:hover {
            background-color: #e0006c;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>EASY-CONVERTER</h1>

        <div class="section local">
            <h2>Konwerter Plików</h2>
            <label class="custom-file-upload">
                <input type="file" id="file-chooser" onchange="pokazNazwePliku()">
                📁 Wybierz plik z komputera
            </label>
            <span id="file-name">Nie wybrano pliku</span>
        </div>

        <div class="section beta">
            <h2>Funkcje BETA (Downloader)</h2>
            <input type="text" id="link-input" placeholder="Wklej link z YouTube lub Spotify...">
            
            <div class="options">
                <label>
                    <input type="radio" name="format" value="MP3" checked> MP3 (Audio)
                </label>
                <label>
                    <input type="radio" name="format" value="MP4"> MP4 (Wideo)
                </label>
            </div>

            <button class="btn-action" onclick="uruchomBeta()">Pobierz i Konwertuj</button>
        </div>
    </div>

    <script>
        function pokazNazwePliku() {
            const fileInput = document.getElementById('file-chooser');
            const fileNameSpan = document.getElementById('file-name');
            
            if (fileInput.files.length > 0) {
                fileNameSpan.innerText = "Wybrano: " + fileInput.files[0].name;
                fileNameSpan.style.color = "#00ffcc";
            }
        }

        function运行Beta() {
            // alias link do uruchomBeta
        }
        
        function uruchomBeta() {
            const link = document.getElementById('link-input').value.trim();
            const format = document.querySelector('input[name="format"]:checked').value;

            if (link === "") {
                alert("Najpierw wklej link!");
                return;
            }

            if (link.includes("youtube.com") || link.includes("youtu.be")) {
                alert(`[Easy-Converter BETA]\nWykryto link z YouTube!\nRozpoczynam pobieranie jako: ${format}`);
            } else if (link.includes("spotify.com")) {
                alert(`[Easy-Converter BETA]\nWykryto link ze Spotify!\nSzukam utworu i przygotowuję plik ${format}...`);
            } else {
                alert("Nie rozpoznano linku. Wklej poprawny link do YouTube lub Spotify.");
            }
        }
    </script>
</body>
</html>
